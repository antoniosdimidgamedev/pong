[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "terminal-pong"
version = "1.0.0"
description = "Classic Pong in the terminal. Singleplayer + LAN multiplayer with rooms."
readme = "README.md"
license = "MIT"
authors = [
    { name = "antoniosdimidgamedev" },
]
requires-python = ">=3.6"
keywords = ["pong", "game", "terminal", "curses", "multiplayer", "lan"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: POSIX",
    "Environment :: Console :: Curses",
]

[project.urls]
Homepage = "https://github.com/antoniosdimidgamedev/pong"
Repository = "https://github.com/antoniosdimidgamedev/pong"

[project.scripts]
pong = "pong:main"

[tool.setuptools.packages.find]
where = ["src"]
